<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Denegado</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #333;
    }
    
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    
    .alert {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      color: #856404;
      font-size: 14px;
    }
    
    .contact {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
    
    .contact p {
      font-size: 13px;
      color: #999;
    }
    
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.3s ease;
    }
    
    button:hover {
      background: #5568d3;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔒</div>
    <h1>Acceso Revocado</h1>
    <p>Tu acceso a esta aplicación ha sido desactivado.</p>
    
    <div class="alert">
      <strong>⚠️ Tu sesión ha sido revocada</strong><br>
      Si crees que esto es un error, contacta al administrador.
    </div>
    
    <button onclick="handleLogout()">Cerrar Sesión</button>
    
    <div class="contact">
      <p>¿Necesitas ayuda? Contacta al soporte técnico.</p>
    </div>
  </div>

  <script type="module">
    import { clearSession } from "./auth.js";

    window.handleLogout = function() {
      clearSession();
      alert('Sesión cerrada. Serás redirigido a la página principal.');
      window.location.href = '/';
    }

    // Limpia la sesión automáticamente
    clearSession();
  </script>
</body>
</html>
